<style>
:root{
  --cream:#FAF7F2; --espresso:#2C1810; --gold:#C4A882; --taupe:#8B6B52;
  --sand:#E8DDD0; --ink:#1A0F08; --paper:#FDFAF6;
  --display:'Playfair Display','Times New Roman',serif;
  --body:'Be Vietnam Pro',-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);font-weight:300;background:var(--ink);color:var(--cream);line-height:1.7}
a{color:inherit;text-decoration:none}
h1{font-family:var(--display);font-weight:500}

.bar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;background:rgba(26,15,8,.92);backdrop-filter:blur(6px)}
.bar .brand{font-family:var(--display);font-size:19px;letter-spacing:.32em;text-indent:.32em;color:var(--cream)}
.bar .back{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand)}
.bar .back:hover{color:var(--gold)}

.thanks{min-height:78vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 24px;animation:fadeUp .8s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.thanks .eyebrow{font-size:11.5px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);font-weight:400}
.thanks h1{font-size:clamp(28px,5.2vw,42px);letter-spacing:.02em;line-height:1.25;margin:16px 0 12px;max-width:520px}
.thanks .sub{max-width:400px;font-size:15px;color:var(--sand);margin-bottom:24px}
.stars{font-size:22px;letter-spacing:6px;color:var(--gold);margin-bottom:30px}
.btn{display:inline-block;background:var(--gold);color:var(--ink);padding:15px 34px;border-radius:2px;
  font-family:var(--body);font-weight:500;font-size:13px;letter-spacing:.2em;text-transform:uppercase;
  transition:.3s;margin-bottom:16px}
.btn:hover{background:var(--cream);color:var(--espresso);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,15,8,.35)}
.hint{font-size:12px;color:var(--taupe);margin-bottom:36px}
.more{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--sand);border-bottom:1px solid rgba(196,168,130,.4);
  padding-bottom:2px;transition:.3s}
.more:hover{color:var(--gold);border-color:var(--gold)}

footer{padding:36px 20px;text-align:center;color:var(--taupe);font-size:12.5px;background:var(--ink);
  border-top:1px solid rgba(196,168,130,.15)}
.wordmark{display:inline-block;text-align:center;line-height:1;font-family:var(--display);margin-bottom:10px}
.wordmark .wm-name{font-size:15px;letter-spacing:.4em;text-indent:.4em;white-space:nowrap;color:var(--sand)}
.wordmark .wm-rule{display:block;width:72%;height:1px;background:var(--gold);margin:.42em auto .38em}
.wordmark .wm-sub{font-size:10px;letter-spacing:.5em;text-indent:.5em;text-transform:uppercase;white-space:nowrap;color:var(--gold);font-family:var(--body);font-weight:300}
</style>
</head>
<body>

<div class="bar">
  <a class="brand" href="../">KINKAY</a>
  <a class="back" href="../">← Về trang chủ</a>
</div>

<div class="thanks">
  <div class="eyebrow">Cảm ơn</div>
  <h1>Cảm ơn chị đã tin tưởng Kay hôm nay</h1>
  <p class="sub">Chị dành 30 giây đánh giá trải nghiệm giúp Kay nhé</p>
  <div class="stars" aria-hidden="true">★★★★★</div>
  <a class="btn" id="reviewBtn" href="https://g.page/r/Cbm9vzO5j8-vEBE/review">Đánh giá trên Google</a>
  <p class="hint" id="hint">Sẽ mở Google để chị chấm sao và viết vài dòng</p>
  <a class="more" id="moreLink" href="../">Xem thêm portfolio của Kay →</a>
</div>

<footer>
  <div class="wordmark">
    <span class="wm-name">KINKAY</span>
    <span class="wm-rule"></span>
    <span class="wm-sub">a beauty atelier</span>
  </div>
  <p>KINKAY · a beauty atelier · HCMC</p>
</footer>

<script>
(function(){
  var GOOGLE_URL='https://g.page/r/Cbm9vzO5j8-vEBE/review';
  var hint=document.getElementById('hint');
  var secs=5;
  var iv=setInterval(function(){
    secs--;
    if(hint) hint.textContent='Tự mở Google sau '+secs+' giây — hoặc bấm nút ở trên';
    if(secs<=0){ clearInterval(iv); location.href=GOOGLE_URL; }
  },1000);
  var more=document.getElementById('moreLink');
  if(more) more.addEventListener('click',function(){ clearInterval(iv); });
  var btn=document.getElementById('reviewBtn');
  if(btn) btn.addEventListener('click',function(){ clearInterval(iv); });
})();
</script>
